<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="author" content="LINPO LAB">
  <meta name="copyright" content="© 2026 LINPO LAB. All rights reserved.">
  <title>一文多图</title>
  
  <!-- 引入高级无衬线字体与等宽字体 -->
  <link rel="stylesheet" href="styles.css">

  <!-- React & ReactDOM -->
  <script src="vendor/react.js"></script>
  <script src="vendor/react-dom.js"></script>

  <!-- Lucide Icons -->
  <script src="vendor/lucide.js"></script>
  <script src="vendor/html2canvas.js"></script>

  <style>
    /* 全局滚动条优化 */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(148, 163, 184, 0.4);
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.7); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* =========================================================
       左侧输入框多状态与流动渐变描边系统
       ========================================================= */
    @keyframes borderFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .flowing-border-wrapper {
      position: relative;
      border-radius: 16px;
      z-index: 1;
    }
    
    .flowing-border-wrapper::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #0ea5e9, #6366f1);
      background-size: 300% 300%;
      animation: borderFlow 3s ease infinite;
      z-index: -1;
      opacity: 0.4;
      transition: opacity 0.3s ease;
      padding: 2px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    
    .flowing-border-wrapper:focus-within::before {
      opacity: 1;
    }
    
    .flowing-border-inner {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255, 0.4) !important;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6) !important;
      border: 0px solid transparent !important; 
      border-radius: 16px !important;
      outline: none !important;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      display: block; 
    }
    
    .flowing-border-wrapper:hover .flowing-border-inner {
      background-color: rgba(255, 255, 255, 0.6) !important;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8) !important;
    }
    
    .flowing-border-wrapper:focus-within .flowing-border-inner {
      background-color: rgba(255, 255, 255, 0.9) !important;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0) !important;
    }

    /* =========================================================
       背景弥散流体动画 (重度强化版 & GPU 硬件加速防闪烁)
       ========================================================= */
    @keyframes blobFluid {
      0% {
        transform: translate(0vw, 0vh) scale(1) rotate(0deg);
        border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      }
      25% {
        transform: translate(15vw, -15vh) scale(1.3, 0.8) rotate(90deg);
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      }
      50% {
        transform: translate(-10vw, 25vh) scale(0.8, 1.4) rotate(180deg);
        border-radius: 40% 60% 70% 30% / 40% 60% 30% 60%;
      }
      75% {
        transform: translate(-25vw, -10vh) scale(1.2, 1.1) rotate(270deg);
        border-radius: 70% 30% 50% 50% / 30% 40% 60% 70%;
      }
      100% {
        transform: translate(0vw, 0vh) scale(1) rotate(360deg);
        border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      }
    }

    .animate-blob-fluid {
      /* 加快整体流动速率，使得运动轨迹更加活跃 */
      animation: blobFluid 16s infinite linear;
      transform-origin: center center;
      /* 强制开启 GPU 硬件加速，分离图层，防止前端滚动时背景模糊发生重绘闪烁 */
      will-change: transform, border-radius;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .animation-delay-1 {
      animation-delay: -5s;
      animation-duration: 20s;
    }
    .animation-delay-2 {
      animation-delay: -10s;
      animation-duration: 24s;
    }

    .brand-attribution {
      flex-shrink: 0;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.6);
      color: #94a3b8;
      font-size: 10px;
      line-height: 1.6;
      text-align: center;
      user-select: none;
    }

    .brand-attribution-name {
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* MoreImg 旧版玻璃拟态设计系统：新功能继续复用原有材质与比例。 */
    .visual-workbench { display: flex; flex-direction: column; gap: 32px; }
    .visual-prompt-list { display: flex; flex-direction: column; gap: 24px; }
    .visual-panel { overflow: hidden; border: 1px solid rgba(226,232,240,.9); border-radius: 16px; background: rgba(255,255,255,.88); box-shadow: 0 1px 2px rgba(15,23,42,.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .visual-panel-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 24px; border-bottom: 1px solid rgba(226,232,240,.9); background: rgba(248,250,252,.78); }
    .visual-panel-title { display: flex; align-items: center; color: #1e293b; font-size: 14px; font-weight: 700; }
    .visual-panel-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .visual-button { min-height: 40px; border: 1px solid rgba(255,255,255,.8); border-radius: 12px; padding: 0 16px; background: rgba(255,255,255,.8); color: #4f46e5; font-size: 12px; font-weight: 700; box-shadow: 0 1px 2px rgba(15,23,42,.05); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); transition: background-color .18s ease, border-color .18s ease, color .18s ease, transform .18s ease; }
    .visual-button:hover { border-color: rgba(255,255,255,.95); background: #fff; color: #4338ca; transform: translateY(-1px); }
    .visual-button:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    .visual-button:disabled { cursor: not-allowed; border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.5); color: #94a3b8; box-shadow: none; transform: none; }
    .visual-button-primary { border-color: rgba(99,102,241,.5); background: rgba(79,70,229,.9); color: #fff; box-shadow: 0 4px 10px rgba(99,102,241,.2); }
    .visual-button-primary:hover { border-color: rgba(79,70,229,.65); background: #4f46e5; color: #fff; }
    .visual-icon-button { width: 40px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    .visual-notice { margin: 16px 24px 0; border: 1px solid rgba(253,230,138,.75); border-radius: 8px; padding: 10px 12px; background: rgba(255,251,235,.86); color: #92400e; font-size: 11px; line-height: 1.65; }
    .visual-disclosure { margin: 12px 24px 16px; border-top: 1px solid rgba(226,232,240,.8); border-bottom: 1px solid rgba(226,232,240,.8); background: transparent; }
    .visual-disclosure summary { padding: 12px 0; color: #475569; font-size: 12px; font-weight: 700; }
    .visual-prompt-copy { max-height: 288px; overflow: auto; padding: 14px 0; border-top: 1px solid #e2e8f0; white-space: pre-wrap; overflow-wrap: anywhere; color: #475569; font-size: 11px; line-height: 1.65; }
    .visual-prompt-source { margin: 0; overflow-x: auto; border-top: 1px solid rgba(241,245,249,.9); padding: 24px; background: rgba(255,255,255,.72); color: #334155; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .visual-result-band { border-top: 1px solid rgba(226,232,240,.9); padding: 24px; background: rgba(248,250,252,.72); }
    .visual-preview { margin: 0 auto; width: 100%; max-width: 384px; overflow: hidden; border: 1px solid rgba(226,232,240,.9); border-radius: 16px; background: rgba(255,255,255,.9); box-shadow: 0 1px 2px rgba(15,23,42,.05); }
    .visual-checklist { margin: 16px auto 0; width: 100%; max-width: 384px; border-top: 1px solid #cbd5e1; padding-top: 14px; }
    .visual-section { border-top: 1px solid rgba(255,255,255,.75); padding-top: 32px; }
    .visual-card-grid { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 28px 20px; }
    .visual-output-card { min-width: 0; }
    .visual-output-card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; padding: 0 4px; }
    .visual-card-count { display: inline; border: 0; border-radius: 0; padding: 0; background: transparent; color: #6366f1; font-size: 12px; font-weight: 800; line-height: 1.4; white-space: nowrap; }
    .results-stage-nav { display: flex; align-items: center; gap: 6px; overflow-x: auto; border: 1px solid rgba(255,255,255,.6); border-radius: 20px; padding: 6px; background: rgba(255,255,255,.4); box-shadow: 0 1px 2px rgba(15,23,42,.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .results-stage-tab { display: inline-flex; height: 40px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 12px; padding: 0 20px; color: #475569; font-size: 13px; font-weight: 700; white-space: nowrap; transition: background-color .18s ease, color .18s ease, box-shadow .18s ease; }
    .results-stage-tab:hover { background: rgba(255,255,255,.6); color: #4f46e5; }
    .results-stage-tab-active { background: rgba(79,70,229,.9); color: #fff; box-shadow: 0 4px 10px rgba(99,102,241,.2); }
    .results-stage-tab-active:hover { background: #4f46e5; color: #fff; }
    .sidebar-brand-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .sidebar-brand-mark { display: flex; width: 32px; height: 32px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 10px; background: #4f46e5; color: #fff; box-shadow: 0 4px 6px -1px #c7d2fe, 0 2px 4px -2px #c7d2fe; }
    .sidebar-icon-button { display: inline-flex; width: 40px; height: 40px; flex-shrink: 0; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,.6); border-radius: 12px; background: rgba(255,255,255,.8); color: #94a3b8; box-shadow: 0 1px 2px rgba(15,23,42,.05); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); transition: border-color .18s ease, background-color .18s ease, color .18s ease; }
    .sidebar-icon-button:hover { border-color: rgba(255,255,255,.9); background: #fff; color: #4f46e5; }
    .sidebar-icon-button:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    .sidebar-input-shell { position: relative; margin-top: 32px; margin-bottom: 16px; border-radius: 16px; }
    .sidebar-input-shell::before { content: ""; position: absolute; inset: -2px; border-radius: 18px; padding: 2px; background: linear-gradient(90deg,#6366f1,#a855f7,#0ea5e9,#6366f1); background-size: 300% 300%; animation: borderFlow 3s ease infinite; opacity: .4; -webkit-mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; transition: opacity .3s ease; }
    .sidebar-input-shell:focus-within::before { opacity: 1; }
    .sidebar-input { position: relative; display: block; width: 100%; height: 180px; resize: none; border: 0; border-radius: 16px; background: rgba(255,255,255,.4); padding: 16px; color: #1e293b; font-size: 14px; line-height: 1.65; box-shadow: inset 0 0 0 1px rgba(255,255,255,.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: background-color .18s ease, box-shadow .18s ease; }
    .sidebar-input:hover { background: rgba(255,255,255,.6); box-shadow: inset 0 0 0 1px rgba(255,255,255,.8); }
    .sidebar-input:focus { outline: none; background: rgba(255,255,255,.9); box-shadow: inset 0 0 0 1px transparent; }
    .config-dialog { width: 100%; max-width: 672px; max-height: 90vh; overflow: hidden; border: 1px solid rgba(255,255,255,.6); border-radius: 24px; background: rgba(255,255,255,.9); box-shadow: 0 25px 50px -12px rgba(15,23,42,.3); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }
    .config-dialog-header { display: flex; flex-shrink: 0; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(226,232,240,.5); padding: 20px 24px; background: rgba(255,255,255,.5); }
    .config-dialog-body { display: flex; min-height: 0; flex: 1; flex-direction: column; gap: 24px; overflow-x: hidden; overflow-y: auto; padding: 24px; }
    .config-section { display: flex; flex-direction: column; gap: 18px; }
    .config-section + .config-section { border-top: 1px solid rgba(226,232,240,.72); padding-top: 24px; }
    .config-section-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .config-section-title { display: flex; align-items: center; gap: 9px; color: #334155; font-size: 14px; font-weight: 800; line-height: 1.4; }
    .config-section-description { margin-top: 5px; max-width: 48ch; color: #94a3b8; font-size: 11px; line-height: 1.55; }
    .config-section-actions { display: flex; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .config-action-button { display: inline-flex; min-height: 36px; align-items: center; justify-content: center; gap: 7px; border: 1px solid rgba(203,213,225,.8); border-radius: 10px; padding: 0 12px; background: rgba(255,255,255,.68); color: #475569; font-size: 11px; font-weight: 750; transition: border-color .18s ease, background-color .18s ease, color .18s ease, transform .18s ease; }
    .config-action-button:hover { border-color: rgba(99,102,241,.4); background: #fff; color: #4f46e5; transform: translateY(-1px); }
    .config-action-button:active { transform: translateY(1px); }
    .config-action-button:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    .config-action-button:disabled { cursor: wait; border-color: rgba(226,232,240,.8); background: rgba(248,250,252,.8); color: #94a3b8; transform: none; }
    .config-hint { color: #94a3b8; font-size: 11px; line-height: 1.55; }
    .config-status { display: flex; align-items: flex-start; gap: 8px; border-radius: 10px; padding: 10px 12px; font-size: 11px; line-height: 1.55; }
    .config-status-loading { background: #f8fafc; color: #64748b; }
    .config-status-success { background: #ecfdf5; color: #047857; }
    .config-status-error { background: #fff1f2; color: #be123c; }
    .config-grid { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 20px; }
    .config-field { display: flex; min-width: 0; flex-direction: column; gap: 8px; }
    .config-label { color: #475569; font-size: 13px; font-weight: 700; line-height: 1.5; }
    .config-input { display: block; width: 100%; height: 48px; border: 1px solid rgba(226,232,240,.6); border-radius: 12px; background: rgba(255,255,255,.5); padding: 0 16px; color: #475569; font-family: monospace; font-size: 14px; transition: background-color .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .config-input:hover { border-color: rgba(203,213,225,.9); background: rgba(255,255,255,.72); }
    .config-input:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.14); }
    .config-textarea { width: 100%; min-height: 256px; resize: none; overflow-y: hidden; border: 1px solid rgba(226,232,240,.6); border-radius: 12px; background: rgba(255,255,255,.5); padding: 16px; color: #475569; font-family: monospace; font-size: 13px; line-height: 1.65; }
    .config-textarea:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.14); }
    .config-divider { margin: 0; border: 0; border-top: 1px solid rgba(226,232,240,.6); }
    .config-dialog-footer { flex-shrink: 0; border-top: 1px solid rgba(226,232,240,.5); padding: 24px; background: rgba(248,250,252,.5); }
    @media (min-width: 768px) { .config-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .config-span-2 { grid-column: span 2 / span 2; } }
    @media (min-width: 768px) { .visual-card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px) {
      .visual-panel-header { align-items: stretch; }
      .visual-panel-actions { width: 100%; }
      .visual-button:not(.visual-icon-button) { flex: 1 1 auto; }
      .visual-notice, .visual-disclosure { margin-left: 12px; margin-right: 12px; }
      .sidebar-input-shell { margin-top: 16px; margin-bottom: 12px; }
      .sidebar-input { height: 96px; }
      .config-dialog-header, .config-dialog-body, .config-dialog-footer { padding-left: 16px; padding-right: 16px; }
      .config-section-header { flex-direction: column; }
      .config-section-actions { width: 100%; justify-content: flex-start; }
      .config-action-button { flex: 1 1 auto; }
    }

    .html-card-preview-frame {
      width: 360px;
      height: 480px;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 12px;
      background: transparent;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
    }

    .html-card-preview-scale {
      width: 1080px;
      height: 1440px;
      transform: scale(0.333333);
      transform-origin: top left;
    }

    @media (max-width: 420px) {
      .html-card-preview-frame { width: 280px; height: 373.333px; }
      .html-card-preview-scale { transform: scale(0.259259); }
    }

    .moreimg-app-shell { flex-direction: column; }
    .moreimg-sidebar { width: 100%; height: auto; }
    .moreimg-history, .moreimg-brand { display: none; }

    @media (min-width: 768px) {
      .moreimg-app-shell { flex-direction: row; }
      .moreimg-sidebar { width: 320px; height: 100%; padding: 24px; border-right-width: 1px; border-bottom-width: 0; }
      .moreimg-history { display: flex; }
      .moreimg-brand { display: block; }
    }
  </style>
</head>
